# ==========================================
# CLIMATE ML PROJECT CONFIGURATION
# ==========================================

# --- 1. Directory Paths ---
paths:
  raw_data: "./data/raw"
  processed_data: "./data/processed"
  models_output: "./models"
  reports: "./notebooks/reports"

# --- 2. CDS Download Settings ---
cds_download:
  concurrent_requests: 3
  max_retries: 1

# --- 3. Preprocessing Parameters ---
preprocessing:
  target_month: 6
  start_year: 1992
  max_ensemble_members: 25

# --- 4. Variable Suffixes (Chunk Definitions) ---
variables:
  msl: ["1992", "1993", "1994", "1995", "1996", "1997", "1998", "1999", "2000", "2001", "2002", "2003", "2004", "2005", "2006", "2007", "2008", "2009", "2010", "2011", "2012", "2013", "2014", "2015", "2016", "2017", "2018", "2019", "2020", "2021", "2022"]
  tp: ["1992_1996", "1997_2001", "2002_2006", "2007_2011", "2012_2016", "2017_2021", "2022_2022"]
  z500: ["1992_1993", "1994_1995", "1996_1997", "1998_1999", "2000_2001", "2002_2003", "2004_2005", "2006_2007", "2008_2009", "2010_2011", "2012_2013", "2014_2015", "2016_2017", "2018_2019", "2020_2021", "2022_2022"]
  q850: ["1992_1993", "1994_1995", "1996_1997", "1998_1999", "2000_2001", "2002_2003", "2004_2005", "2006_2007", "2008_2009", "2010_2011", "2012_2013", "2014_2015", "2016_2017", "2018_2019", "2020_2021", "2022_2022"]

# --- 5. Target Construction (POT) ---
target:
  variable: "tp"
  pot_threshold_percentile: 95
  extreme_label: 1
  non_extreme_label: 0
  
  # Define your areas of interest here to switch quickly
  active_location: "kumasi" 
  locations:
    kumasi:
      lon: -1.62443
      lat: 6.68848

# --- 6. Feature Extraction (PCA) ---
feature_extraction:
  pca:
    # Save a high baseline of components during script 03
    explained_variance_ratio: 0.99 
    random_state: 42

# --- 7. Machine Learning Pipeline ---
ml_pipeline:
  random_state: 42
  random_forest_grid:
    n_estimators: [10, 50, 100, 150, 200]
    max_depth: [3, 5, 7, 10, 15]
    min_samples_leaf: [5, 10, 20, 50]
    max_features: ['sqrt', 'log2', 0.2]
    class_weight: 
      - 'balanced'
      - {0: 1, 1: 5}
      - {0: 1, 1: 10}
      - {0: 1, 1: 20}